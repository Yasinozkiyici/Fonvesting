name: Hourly BIST Sync (Vercel Trigger)

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı
  workflow_dispatch:

jobs:
  hourly-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Vercel /api/jobs/sync (Borsa açıkken)
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${PRODUCTION_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Gerekli secrets eksik: PRODUCTION_URL ve CRON_SECRET"
            exit 1
          fi

          SHOULD_RUN=$(python3 - <<'PY'
          import datetime
          tz = datetime.timezone(datetime.timedelta(hours=3))  # UTC+3 (Türkiye)
          now = datetime.datetime.now(tz).time()
          start = datetime.time(9, 0)
          end = datetime.time(18, 30)  # 18:30'dan sonra kapalı
          print("yes" if start <= now <= end else "no")
          PY
          )

          echo "Türkiye saati aralığı kontrolü: $SHOULD_RUN"

          if [ "$SHOULD_RUN" != "yes" ]; then
            echo "Borsa kapalı, işlem yapılmadı"
            exit 0
          fi

          echo "Borsa açık: Vercel cron endpoint'i çağrılıyor..."
          # PRODUCTION_URL sonunda `/` varsa temizle, yoksa Vercel yönlendirme yapabiliyor.
          PRODUCTION_URL="${PRODUCTION_URL%/}"
          TARGET_URL="${PRODUCTION_URL}/api/jobs/sync"

          # Vercel bazen canonical domain/https redirect yapar; redirect'i takip etmezsek endpoint çalışmaz.
          HTTP_CODE="$(curl -sSL \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TARGET_URL}" \
            -o /tmp/cron-sync-response.json \
            -w "%{http_code}")"

          echo "HTTP status: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Endpoint çağrısı başarısız oldu."
            echo "Endpoint raw response:"
            cat /tmp/cron-sync-response.json
            exit 1
          fi

          echo "Endpoint response:"
          cat /tmp/cron-sync-response.json

