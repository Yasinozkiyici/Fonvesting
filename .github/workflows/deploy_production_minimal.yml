name: Deploy Production (Minimal)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations (deploy)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Prisma şemasındaki `directUrl` için non-empty değer gerekir.
          # GitHub Secrets'ta `DIRECT_URL` yoksa, `DATABASE_URL` ile aynı veriyoruz.
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate:deploy

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          production: true

