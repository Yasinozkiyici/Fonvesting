# Günlük otomatik TEFAS: Selenium + Python burada çalışır, Vercel’de değil.
# Secrets / env (Prisma runtime):
# - DATABASE_URL (required): pooler URI; POSTGRES_PRISMA_URL workflow’da yoksa bu kullanılır.
# - DATABASE_CONNECTION_LIMIT + DATABASE_POOL_TIMEOUT (below): batch import; env set ise
#   resolvePrismaDatasourceUrl URL’deki connection_limit / pool_timeout değerlerinin üzerine yazar.
#
# "Can't reach database server" (GitHub Actions) genelde şunlardan biri:
# 1) Supabase → Project Settings → Database → Network / "Restrict …" KAPALI olmalı
#    (sadece belirli IP’lere izin varsa GitHub runner’lar bağlanamaz).
# 2) Proje duraklatılmışsa (free tier) Dashboard’dan Resume.
# 3) Bağlantı dizesinde ?sslmode=require olsun.
# 4) db.*:5432 = çoğu ortamda IPv6; GitHub Actions IPv4 kullanır → "Can't reach" normaldir.
#    Çözüm: Supabase Dashboard → Connect → Method: "Session pooler" URI’yi kopyala,
#    GitHub DATABASE_URL secret’ına yapıştır. Kullanıcı adı postgres.değil,
#    postgres.PROJECT_REF şeklindedir; host aws-0-BÖLGE.pooler.supabase.com:5432 olur.
#    Alternatif: Connect → Transaction mode (db.*:6543) + sorgu dizesine
#    ?pgbouncer=true&sslmode=require ekleyin (Prisma uyumludur).
name: Daily TEFAS sync

on:
  schedule:
    # Hafta içi 20:30 Türkiye (UTC+3 sabit) ≈ 17:30 UTC
    - cron: "30 17 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-tefas-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv + tefasfon
        run: |
          python -m venv scripts/.venv
          scripts/.venv/bin/pip install --upgrade pip
          scripts/.venv/bin/pip install -r scripts/requirements.txt

      - name: Install Google Chrome (Selenium)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Normalize DATABASE_URL for runner connectivity
        id: normalize_db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL Actions secret tanımlı değil. Repo ayarlarından ekleyin."
            exit 1
          fi
          if [ -z "$DIRECT_URL" ]; then
            echo "::error::DIRECT_URL Actions secret tanımlı değil. Write-heavy canonical sync için gerekli."
            exit 1
          fi
          normalized_url="$(
            node <<'NODE'
          const raw = (process.env.DATABASE_URL || "").trim().replace(/\\n/g, "");
          if (!raw) process.exit(2);
          let out = raw;
          try {
            const u = new URL(raw);
            const host = (u.hostname || "").toLowerCase();
            if (host.includes("pooler.supabase.com")) {
              // GitHub runners cannot reliably reach session pooler (:5432) in this project.
              // Force transaction pooler port and enable Prisma pgbouncer mode.
              if (!u.port || u.port === "5432") u.port = "6543";
              u.searchParams.set("pgbouncer", "true");
              if (!(u.searchParams.get("sslmode") || "").trim()) u.searchParams.set("sslmode", "require");
              out = u.toString();
            }
          } catch {
            out = raw;
          }
          process.stdout.write(out);
          NODE
          )" || {
            echo "::error::DATABASE_URL normalize edilemedi."
            exit 1
          }
          echo "::add-mask::$normalized_url"
          echo "database_url=$normalized_url" >> "$GITHUB_OUTPUT"
          direct_url="$(
            node <<'NODE'
          const raw = (process.env.DIRECT_URL || "").trim().replace(/\\n/g, "");
          if (!raw) process.exit(2);
          process.stdout.write(raw);
          NODE
          )" || {
            echo "::error::DIRECT_URL normalize edilemedi."
            exit 1
          }
          echo "::add-mask::$direct_url"
          echo "direct_url=$direct_url" >> "$GITHUB_OUTPUT"

      - name: Run canonical daily sync pipeline
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          # Canonical pipeline: source -> raw ingest -> snapshot -> serving -> chart -> comparison -> freshness
          DATABASE_CONNECTION_LIMIT: "3"
          DATABASE_POOL_TIMEOUT: "60"
        run: |
          pnpm run data:sync:daily

      - name: Daily ledger strict evidence
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          DATABASE_CONNECTION_LIMIT: "3"
          DATABASE_POOL_TIMEOUT: "60"
        run: |
          pnpm run data:daily:ledger-evidence -- --strict --limit 10

      - name: Canonical health report strict
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          DATABASE_CONNECTION_LIMIT: "3"
          DATABASE_POOL_TIMEOUT: "60"
        run: |
          pnpm run data:health:report -- --strict

      - name: Phase A chain evidence (health-truth integrity)
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          DATABASE_CONNECTION_LIMIT: "3"
          DATABASE_POOL_TIMEOUT: "60"
        run: |
          for attempt in 1 2 3; do
            if pnpm exec tsx scripts/phase-a-chain-evidence.ts --gate; then
              exit 0
            fi
            echo "[phase-a-gate] retry attempt=${attempt} failed"
            sleep $((attempt * 10))
          done
          exit 1

      - name: Report raw vs snapshot vs serving lag (ops signal)
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          DATABASE_CONNECTION_LIMIT: "3"
          DATABASE_POOL_TIMEOUT: "60"
        run: pnpm exec tsx scripts/report-data-lag.ts

      - name: Verify freshness target date reached
        env:
          DATABASE_URL: ${{ steps.normalize_db.outputs.database_url }}
          DIRECT_URL: ${{ steps.normalize_db.outputs.direct_url }}
          POSTGRES_PRISMA_URL: ${{ steps.normalize_db.outputs.direct_url }}
          DATABASE_CONNECTION_LIMIT: "1"
          DATABASE_POOL_TIMEOUT: "60"
        run: |
          for attempt in 1 2 3; do
            if pnpm exec tsx scripts/check-freshness-target.ts --strict; then
              exit 0
            fi
            echo "[freshness-target] retry attempt=${attempt} failed"
            sleep $((attempt * 10))
          done
          exit 1
