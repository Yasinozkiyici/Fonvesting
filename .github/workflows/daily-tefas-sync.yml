# Günlük otomatik TEFAS: Selenium + Python burada çalışır, Vercel’de değil.
# Gerekli sır: Repo → Settings → Secrets and variables → Actions → DATABASE_URL
# Öneri: Supabase “doğrudan” bağlantı (db.*.supabase.co:5432); pooler uzun transaction’larda sorun çıkarabilir.
name: Daily TEFAS sync

on:
  schedule:
    # Hafta içi 20:30 Türkiye (UTC+3 sabit) ≈ 17:30 UTC
    - cron: "30 17 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-tefas-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv + tefasfon
        run: |
          python -m venv scripts/.venv
          scripts/.venv/bin/pip install --upgrade pip
          scripts/.venv/bin/pip install -r scripts/requirements.txt

      - name: Install Google Chrome (Selenium)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run full TEFAS import
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL Actions secret tanımlı değil. Repo ayarlarından ekleyin."
            exit 1
          fi
          pnpm run import:tefas-full
