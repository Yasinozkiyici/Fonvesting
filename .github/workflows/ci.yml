name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fonvesting
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fonvesting"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fonvesting"
      CRON_SECRET: "ci-placeholder-not-for-production"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate (PostgreSQL)
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm run build
