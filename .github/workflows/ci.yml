name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      CRON_SECRET: "ci-placeholder-not-for-production"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate (SQLite)
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm run build
