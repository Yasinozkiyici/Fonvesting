name: Release Critical Gate

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target deployment URL (e.g. https://www.yatirim.io)"
        required: true
        type: string
      degraded_scenario:
        description: "Run degraded scenario checks as well"
        required: false
        default: true
        type: boolean

jobs:
  verify-critical-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify critical routes (normal)
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          HEALTH_SECRET: ${{ secrets.HEALTH_SECRET }}
          SMOKE_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERIFY_REQUIRE_SCENARIOS: "1"
        run: pnpm run verify:critical-routes

      - name: Verify critical routes (degraded)
        if: ${{ inputs.degraded_scenario }}
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          HEALTH_SECRET: ${{ secrets.HEALTH_SECRET }}
          SMOKE_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERIFY_REQUIRE_SCENARIOS: "1"
          VERIFY_SCENARIO: "degraded"
        run: pnpm run verify:critical-routes

      - name: Data platform release gate
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          HEALTH_SECRET: ${{ secrets.HEALTH_SECRET }}
          SMOKE_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm run data:release:gate

      - name: Release readiness chain (prodlike + target URL)
        env:
          SMOKE_UI_TIMEOUT_MS: "90000"
          RELEASE_PREVIEW_URL: ${{ inputs.base_url }}
          RELEASE_REQUIRE_PREVIEW: "0"
          RELEASE_REQUIRE_PRODUCTION: "0"
          SMOKE_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm run verify:release-readiness
